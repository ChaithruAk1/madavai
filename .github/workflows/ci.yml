name: verify
on: [push, pull_request]
jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Verify packages (strict typecheck + build + tests)
        run: node scripts/verify-packages.mjs
